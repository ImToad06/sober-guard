version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: soberguard_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: soberguard_backend
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/soberguard}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - PORT=${PORT:-3000}
    depends_on:
      - mongodb

  frontend:
    build: 
      context: ./frontend
      args:
        - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-http://localhost:3000}
        - PUBLIC_WS_URL=${PUBLIC_WS_URL:-ws://localhost:3000/ws}
    container_name: soberguard_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      - ORIGIN=http://localhost:${FRONTEND_PORT:-5173}
      - PORT=${FRONTEND_PORT:-5173}
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-http://localhost:3000}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL:-ws://localhost:3000/ws}
    depends_on:
      - backend

volumes:
  mongo_data:
